<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kairós · Opções de tema</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Sora:wght@600;700;800&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@500;600;700;800&display=swap"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#15110f;color:#fff;font-family:"Manrope",sans-serif;padding:32px 20px 80px}
  .pagehead{max-width:1100px;margin:0 auto 28px}
  .pagehead h1{font-size:24px;font-weight:800}
  .pagehead p{color:#aaa;font-size:14px;margin-top:6px}
  .grid{max-width:1100px;margin:0 auto;display:grid;gap:24px}
  .card{border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
  .top{padding:30px 32px}
  .tag{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.7}
  .ttl{font-size:clamp(30px,4vw,46px);line-height:1.05;margin-top:10px;letter-spacing:-0.02em}
  .ttl em{font-style:italic;font-weight:600}
  .sub{font-size:15px;margin-top:14px;opacity:.85;max-width:520px}
  .row{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:8px;border:none;font-weight:700;font-size:15px;padding:14px 24px;border-radius:999px;font-family:inherit}
  .btn-wa{background:#25D366;color:#fff}
  .stats{display:flex;gap:28px;margin-top:24px;flex-wrap:wrap}
  .stats b{font-size:24px;display:block;line-height:1}
  .stats span{font-size:12px;opacity:.7}
  .swatches{display:flex}
  .sw{flex:1;height:46px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:.05em}
  .meta{padding:14px 32px;background:rgba(0,0,0,.25);font-size:12.5px;color:#bbb;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
</style></head><body>
<div class="pagehead">
  <h1>Edifício Kairós — 3 opções de tema</h1>
  <p>Cada cartão mostra a paleta + a tipografia juntas, do jeito que apareceriam na landing page. Me diga o número (ou misture: "fonte da 1 com cor da 3").</p>
</div>
<div class="grid" id="grid"></div>
<script>
const THEMES = [
  {
    id:1, nome:'1 · Delman Navy (institucional + tech)',
    main:'#13294B', deep:'#0A1A33', soft:'#DCE3EE', ink:'#16202E', paper:'#F7F9FC',
    sans:'"Space Grotesk",sans-serif', titleFont:'"Space Grotesk",sans-serif', titleItalic:false,
    desc:'Azul-marinho da marca Delman + sans geométrica. Sóbrio, confiável, "construtora séria". O verde do WhatsApp contrasta forte.'
  },
  {
    id:2, nome:'2 · Areia & Bronze (alto padrão / luxo)',
    main:'#9A6A3C', deep:'#7C5430', soft:'#EFE4D3', ink:'#2A2622', paper:'#FBF8F3',
    sans:'"Manrope",sans-serif', titleFont:'"Playfair Display",serif', titleItalic:true,
    desc:'Bege quente + bronze/dourado, títulos em serif clássica. Ar de imóvel premium, sofisticado e atemporal.'
  },
  {
    id:3, nome:'3 · Verde Profundo & Off-white (clean / natureza)',
    main:'#1F4D3F', deep:'#143329', soft:'#DDE8E1', ink:'#1A201D', paper:'#F8FAF7',
    sans:'"Outfit",sans-serif', titleFont:'"Outfit",sans-serif', titleItalic:false,
    desc:'Verde profundo elegante + off-white, sans moderna e limpa. Transmite tranquilidade, qualidade de vida e harmoniza com o verde do WhatsApp.'
  }
];
const wa='<svg viewBox="0 0 32 32" width="18" height="18" fill="#fff"><path d="M16 .4C7.4.4.5 7.3.5 15.9c0 2.8.7 5.4 2 7.8L.4 31.6l8.1-2.1c2.3 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.4 16 .4z"/></svg>';
document.getElementById('grid').innerHTML = THEMES.map(t=>{
  const titleStyle='font-family:'+t.titleFont+';font-weight:700;color:'+t.ink+(t.titleItalic?';font-style:normal':'');
  const emStyle=t.titleItalic?'font-family:'+t.titleFont+';font-style:italic;color:'+t.main:'font-family:'+t.titleFont+';font-style:italic;color:'+t.main;
  return `<div class="card">
    <div class="top" style="background:${t.paper};color:${t.ink};font-family:${t.sans}">
      <div class="tag" style="color:${t.main}">● Pronto para morar · Jatiúca</div>
      <div class="ttl" style="${titleStyle}">Seu apartamento <em style="${emStyle}">pronto</em> a 5 minutos da praia.</div>
      <div class="sub">Até 3 suítes, 87 a 149 m² e lazer completo. Financiamento em até 100 meses com a Construtora Delman.</div>
      <div class="row">
        <button class="btn btn-wa">${wa} Falar no WhatsApp</button>
        <button class="btn" style="background:${t.main};color:#fff;font-family:${t.sans}">Ver plantas e valores</button>
      </div>
      <div class="stats" style="font-family:${t.sans}">
        <div><b style="color:${t.main};font-family:${t.titleFont}">40 anos</b><span>Construtora Delman</span></div>
        <div><b style="color:${t.main};font-family:${t.titleFont}">5 min</b><span>da praia</span></div>
        <div><b style="color:${t.main};font-family:${t.titleFont}">Até 3</b><span>suítes</span></div>
      </div>
    </div>
    <div class="swatches">
      <div class="sw" style="background:${t.main};color:#fff">${t.main}</div>
      <div class="sw" style="background:${t.deep};color:#fff">${t.deep}</div>
      <div class="sw" style="background:${t.soft};color:${t.ink}">${t.soft}</div>
      <div class="sw" style="background:${t.paper};color:${t.ink}">${t.paper}</div>
      <div class="sw" style="background:${t.ink};color:#fff">${t.ink}</div>
    </div>
    <div class="meta"><span><b style="color:#fff">${t.nome}</b></span><span>${t.desc}</span></div>
  </div>`;
}).join('');
</script>
</body></html>
